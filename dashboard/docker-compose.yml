version: "3.9"

services:
  dashboard:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - .:/app                       # <--- QUESTA È LA RIGA MANCANTE!
      - ./data:/data:ro
      - ./images/ALLSTIMULI:/images/ALLSTIMULI:ro
      - ./images/ALLFIXATIONMAPS:/images/ALLFIXATIONMAPS:ro
    environment:
      - DATA_DIR=/data
      - IMAGES_DIR=/images
    restart: unless-stopped
